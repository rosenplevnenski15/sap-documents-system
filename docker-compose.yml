services:
  postgres:
    image: postgres:15
    container_name: documents-db
    restart: always
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./DocumentSystemBackend/documentsSystem
    container_name: documents-app
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/documents
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: this_is_a_dev_only_secret_replace_me
      JWT_EXPIRATION: "3600000"
      AWS_BUCKET: dev-bucket
      AWS_REGION: eu-central-1
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./DocumentSystemFrontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: documents-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
